# Deployment Workflow

name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Connectivity Check
      run: |
        echo "Running connectivity checks..."
        if nc -z -w5 your.server.com 22; then
          echo "Server is reachable"
        else
          echo "Server is not reachable"
          exit 1
        fi

    - name: Debug Logging
      run: |
        echo "Starting deployment..."
        echo "Using SSH with verbose logging"

    - name: SSH Connection
      run: |
        ssh -vvv user@your.server.com 'echo Connection successful' || (echo 'SSH connection failed'; exit 1)

    - name: Additional Commands
      run: |
        echo "Executing additional deployment commands..."
