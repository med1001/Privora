name: Deploy Backend to EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create firebase_credentials.json from Secret
        run: |
          cat << 'EOF' > server/src/firebase_credentials.json
          ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          EOF

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/privora-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~

            # 1. Create the .env file for the backend from secrets
            cat << 'EOF' > ~/.env
            ${{ secrets.BACKEND_ENV_CONTENT }}
            EOF

            # 2. Pull the latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/privora-backend:latest

            # 3. Restart the backend container
            docker compose up -d --force-recreate backend

            # 4. Clean up old images to free disk space
            docker image prune -f
