# Example stack: copy beside your EC2 .env (see ec2.env.example), then:
#   docker compose --env-file .env -f docker-compose.ec2.yml up -d
#
# Open in AWS security group: TCP 3478, UDP 3478, UDP 49160-49200 (relay range below).

version: "3.8"

services:
  coturn:
    image: coturn/coturn:latest
    container_name: coturn
    restart: always
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
    networks:
      - my-network
    command:
      - "-n"
      - "--log-file=stdout"
      - "--listening-port=3478"
      - "--fingerprint"
      - "--use-auth-secret"
      - "--static-auth-secret=${TURN_SHARED_SECRET}"
      - "--realm=privora"
      - "--external-ip=${TURN_PUBLIC_IP}"
      - "--min-port=49160"
      - "--max-port=49200"
      - "--no-cli"
      - "--no-tls"
      - "--no-dtls"

  backend:
    image: med1001/prvra:latest
    container_name: backend
    restart: always
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - FIREBASE_ADMIN_CREDENTIALS_JSON=/app/secrets/firebase-adminsdk.json
      - STUN_SERVER_URLS=${STUN_SERVER_URLS:-}
      - TURN_SERVER_URLS=${TURN_SERVER_URLS:-}
      - TURN_SHARED_SECRET=${TURN_SHARED_SECRET:-}
      - TURN_TTL_SECONDS=${TURN_TTL_SECONDS:-3600}
    volumes:
      - /home/ubuntu/secrets:/app/secrets:ro
    networks:
      - my-network

  frontend:
    image: med1001/privora-gui:latest
    container_name: frontend
    restart: always
    networks:
      - my-network

  nginx-proxy:
    image: med1001/reverse-proxy:latest
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - my-network

networks:
  my-network:
    external: true
